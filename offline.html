<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Sin conexión · Kiosco</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f17;
      color: #f4f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem
    }

    .card {
      background: #1a1a26;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 400px;
      width: 100%;
      text-align: center
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: block;
      animation: float 3s ease-in-out infinite
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: .75rem
    }

    p {
      color: #a0a0b0;
      font-size: .95rem;
      line-height: 1.6;
      margin-bottom: 2rem
    }

    button {
      background: #f97316;
      color: #fff;
      border: none;
      padding: .75rem 2rem;
      border-radius: 12px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: filter .2s
    }

    button:hover {
      filter: brightness(1.1)
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-10px)
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <span class="icon">📡</span>
    <h1>Sin conexión</h1>
    <p>Verifica tu conexión a internet y vuelve a intentarlo.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>

</html>
